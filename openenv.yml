name: smart_sprint_env
description: >
  OpenEnv environment for Agile sprint planning and dynamic re-planning.
  Agents must assign work across a team while handling changing capacity,
  injected urgent work, and shifting dependencies.
version: "1.0.0"
entrypoint: env.environment:SprintEnv

tasks:
  - id: easy
    name: easy
    difficulty: easy
    objective: Create the best sprint plan from a static backlog with fixed capacity and deadlines.
    description: Static sprint planning without disruptions. Evaluate the agent's ability to prioritize tasks by urgency, deadline, skill fit, and available developer capacity. Success means maximizing task completion rate while respecting deadlines.
    grader: env.graders:grade_easy
    score_range: [0.0, 1.0]
    deterministic: true
  - id: medium
    name: medium
    difficulty: medium
    objective: Revise the sprint plan once after a single mid-sprint disruption (e.g., new urgent work or capacity loss).
    description: Dynamic replanning with one disruption event. Tests agent adaptability—can the agent absorb new urgent work and rebalance without cascading failures? Success means maintaining overall completion rate while prioritizing disruption-created work.
    grader: env.graders:grade_medium
    score_range: [0.0, 1.0]
    deterministic: true
  - id: hard
    name: hard
    difficulty: hard
    objective: Re-plan repeatedly under multiple disruptions while preserving feasibility and value delivery.
    description: Complex replanning with 3+ disruptions over time (new work, dependency shifts, capacity loss). Frontier task requiring sophisticated re-planning strategies. Tests if the agent can handle volatility while maximizing utility. Success means staying feasible, completing high-priority work, and adapting gracefully.
    grader: env.graders:grade_hard
    score_range: [0.0, 1.0]
    deterministic: true

environment:
  max_steps: 20
  reward: dense
  observation_space: structured
  action_space: discrete_assignment

grading:
  completion_rate: 0.25
  on_time_delivery: 0.20
  extraction_quality: 0.15
  workload_balance: 0.10
  efficiency: 0.10
  adaptability: 0.20

dependencies:
  - fastapi
  - uvicorn
  - pydantic
  - numpy
  - openai
  - tenacity

server:
  host: 0.0.0.0
  port: 7860
  endpoint_reset: /reset
  endpoint_step: /step
  endpoint_grade: /grade
